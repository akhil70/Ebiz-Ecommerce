spring:
  application:
    name: Ebiz-Backend
  data:
    mongodb:
      uri: mongodb://localhost:27017/ebiz
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8080/realms/ebiz
          
server:
  port: 9000

logging:
  level:
    org.springframework.security: DEBUG
